<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>พิธีบายศรีสู่ขวัญ - ช่อแก้ว</title>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #2c3e50;
            --text-color: #ecf0f1;
            --glow-color: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Kanit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 3s ease, box-shadow 3s ease;
            box-shadow: inset 0 0 150px var(--glow-color);
        }

        /* หน้าจอเริ่มต้น (ต้องมีเพื่อให้เบราว์เซอร์อนุญาตให้เล่นเพลง) */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            flex-direction: column;
            transition: opacity 1s ease;
        }
        
        #start-screen p {
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            color: #bdc3c7;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* คอนเทนเนอร์แสดงข้อความ */
        #story-container {
            width: 90%;
            max-width: 400px;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .story-text {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease, transform 1.5s ease;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .story-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .font-chant {
            font-family: 'Charm', cursive;
            font-size: 1.5rem;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* คำแนะนำให้กดหน้าจอ */
        #tap-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            z-index: 10;
        }

        /* Canvas สำหรับสายสิญจน์ */
        #canvas-saisin {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 3s ease;
        }

        /* ---------------- CSS เทียนสมจริง ---------------- */
        #candle-wrapper {
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 150px;
            opacity: 0;
            transition: bottom 3s ease, opacity 3s ease;
            z-index: 1;
        }

        #candle-wrapper.show {
            bottom: 50px;
            opacity: 1;
        }

        .candle-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #eaddcd 0%, #fffbf2 30%, #fffbf2 70%, #d8c8b5 100%);
            border-radius: 5px 5px 10px 10px;
            position: relative;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5);
        }

        /* น้ำตาเทียน */
        .wax {
            position: absolute;
            top: 0;
            background: #fffbf2;
            border-radius: 50px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        .wax-1 { width: 12px; height: 35px; left: 5px; }
        .wax-2 { width: 10px; height: 25px; right: 10px; top: 5px; }

        .wick {
            width: 4px;
            height: 15px;
            background: #2c3e50;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .flame {
            width: 20px;
            height: 40px;
            background: #ffeb3b;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                0 0 20px rgba(255, 235, 59, 0.8),
                0 0 50px rgba(255, 152, 0, 0.8),
                0 0 80px rgba(244, 67, 54, 0.6);
            animation: flicker 0.1s infinite alternate;
        }

        .flame-inner {
            width: 10px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.05) rotate(2deg); opacity: 0.9; }
        }

    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen" onclick="startGame()">
        <p>แตะหน้าจอเพื่อเข้าสู่ลานพิธี</p>
    </div>

    <canvas id="canvas-saisin"></canvas>

    <div id="candle-wrapper">
        <div class="candle-body">
            <div class="wax wax-1"></div>
            <div class="wax wax-2"></div>
            <div class="wick"></div>
            <div class="flame"><div class="flame-inner"></div></div>
        </div>
    </div>

    <div id="story-container">
        <div id="text-display"></div>
    </div>

    <div id="tap-hint">แตะหน้าจอเพื่ออ่านต่อ</div>

    <script>
        const storyLines = [
            { text: "หลังจากการเดินทางอันยาวนานตลอดทั้งวัน ในที่สุดรถบัสของมหาวิทยาลัยสิบศิลป์สิริศาสตร์และมหาวิทยาลัยเบงจันทร์ก็เคลื่อนตัวเข้าสู่มหาวิทยาลัยช่อแก้ว", class: "" },
            { text: "กระทั่งยามเย็นเมื่อทุกคนจัดการธุระส่วนตัวเรียบร้อยแล้วจึงถูกเชิญมาที่ลานหน้าคณะศิลปกรรมศาสตร์", class: "" },
            { text: "แสงแดดยามเย็นกำลังอ่อนตัวลง...", trigger: "sunset" },
            { text: "ขณะที่ลมต้นฤดูฝนพัดเอากลิ่นดินและความเย็นสบายเข้ามาปะทะใบหน้า", class: "" },
            { text: "ผ้าขาวถูกขึงประดับเหนือศีรษะ สายสิญจน์ทอดยาวล้อมพื้นที่พิธีเอาไว้ ขณะที่บายศรีต้นใหญ่ตั้งเด่นอยู่กลางลานรอรับผู้มาเยือน", class: "" },
            { text: "นักศึกษาช่อแก้วทยอยยืนเรียงแถวอยู่ทั้งสองข้างทาง เสียงพูดคุยและรอยยิ้มดังขึ้นเป็นระยะเมื่อได้พบหน้ากันเป็นครั้งแรก", class: "" },
            { text: "บางคนเคยพูดคุยกันผ่านหน้าจอ... บางคนเคยเห็นเพียงภาพถ่าย... และบางคนก็ยังไม่เคยรู้จักกันเลย", class: "" },
            { text: "แต่ค่ำคืนนี้คือจุดเริ่มต้นของการทำความรู้จักกัน", class: "" },
            { text: "\"สวัสดีทุกคนค่ะ\"", class: "" },
            { text: "\"ในนามของมหาวิทยาลัยช่อแก้ว พวกเรายินดีต้อนรับเพื่อน ๆ จากมหาวิทยาลัยสิบศิลป์สิริศาสตร์และมหาวิทยาลัยเบงจันทร์สู่จังหวัดขอนแก่น\"", class: "" },
            { text: "\"ตามประเพณีของชาวอีสาน การเดินทางมาถึงสถานที่ใหม่หรือการเริ่มต้นสิ่งใหม่ มักมีพิธีบายศรีสู่ขวัญเพื่อเป็นการต้อนรับและอวยพร\"", class: "" },
            { text: "กลางวงล้อมมีบายศรีประดับด้วยดอกไม้สีขาวและเหลืองอย่างสวยงาม...", trigger: "darkness" },
            { text: "เทียนเล่มเล็กถูกจุดขึ้นทีละเล่ม จนเกิดแสงสว่างอ่อนโยนท่ามกลางความมืดมิด", trigger: "candle" },
            { text: "ผู้เฒ่าผู้แก่ที่ได้รับเชิญจากชุมชนค่อย ๆ ก้าวเข้ามานั่งหน้าพานบายศรี ฝ่ามือเหี่ยวย่นยกขึ้นพนมเหนืออก ก่อนจะหลับตาลงช้า ๆ", class: "" },
            { text: "เสียงแคนที่บรรเลงอยู่ด้านข้างค่อย ๆ เบาลง เหลือเพียงเสียงลมยามเย็นพัดผ่านยอดไม้", class: "" },
            { text: "ศรีเอ๋ย ศรีมา...", class: "font-chant" },
            { text: "ศรีของลูกหลานจากแดนไกล<br>ศรีของผู้เดินทางข้ามภูเขา ข้ามแม่น้ำ<br>ให้คืนมาอยู่เนื้ออยู่โต อยู่กายอยู่ใจ", class: "font-chant" },
            { text: "มื้อนี้เป็นมื้อดี<br>มื้อแห่งการพบพ้อ<br>มื้อแห่งการผูกสัมพันธ์", class: "font-chant" },
            { text: "แสงเทียนส่องไหวไปตามแรงลม รอบตัวเงียบสงบเสียจนได้ยินเพียงเสียงบทเอิ้นขวัญ", class: "" },
            { text: "มาเด้อขวัญเอ๋ย มาเด้อ<br>ขวัญที่อยู่ภูไกลให้คืนมา<br>ขวัญที่อยู่ฟ้าไกลให้คืนมา", class: "font-chant" },
            { text: "ให้มาอยู่กับเจ้าของ ให้อยู่คู่กายคู่ใจ<br>ให้มีแต่ความสุข ความเจริญ", class: "font-chant" },
            { text: "เมื่อสิ้นคำเอิ้นขวัญ ผู้เฒ่าจึงหยิบสายสิญจน์ขึ้นมา...", trigger: "saisin" },
            { text: "\"นับแต่มื้อนี้ไป ขอให้ลูกหลานทั้งสามสถาบันฮักแพงกันคือพี่น้อง\"", class: "font-chant" },
            { text: "\"ยินดีต้อนรับสู่ช่อแก้วเด้อ\"", class: "font-chant" },
            { text: "เหล่ารุ่นพี่และตัวแทนจากมหาวิทยาลัยช่อแก้วจึงหยิบสายสิญจน์ขึ้นมาผูกข้อมือให้แก่ผู้มาเยือนทีละคน พร้อมคำอวยพร", class: "" },
            { text: "เสียงหัวเราะดังขึ้น บทสนทนาแรกเริ่มเกิดขึ้น และความเกร็งจากการพบกันครั้งแรกก็ค่อย ๆ ถูกแทนที่ด้วยรอยยิ้ม", class: "" },
            { text: "\"จากนี้ไป พวกเราอาจไม่ได้เป็นเพียงนักศึกษาจากสามมหาวิทยาลัย... แต่จะเป็นเพื่อนร่วมค่ายเดียวกัน\"", class: "" },
            { text: "ภายใต้ท้องฟ้ายามค่ำของเมืองขอนแก่น ค่ำคืนแรกของการพบกันจึงเริ่มต้นขึ้นอย่างอบอุ่น...", class: "" },
            { text: "และเต็มไปด้วยความหมาย.", class: "" }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        const display = document.getElementById('text-display');

        function startGame() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 1000);
            
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            bgm.play().catch(e => console.log("Audio play prevented", e));
            
            showNextText();
        }

        document.body.addEventListener('click', () => {
            if (document.getElementById('start-screen').style.display !== 'none') return;
            if (isAnimating) return;
            showNextText();
        });

        function showNextText() {
            if (currentIndex >= storyLines.length) return;
            
            isAnimating = true;
            const currentStory = storyLines[currentIndex];
            
            // ลบข้อความเก่าออกอย่างนุ่มนวล
            display.innerHTML = '';
            
            const p = document.createElement('p');
            p.innerHTML = currentStory.text;
            p.className = `story-text ${currentStory.class || ''}`;
            display.appendChild(p);
            
            // จัดการ Trigger สภาพแวดล้อม
            if (currentStory.trigger === "sunset") {
                document.documentElement.style.setProperty('--bg-color', '#1a252f');
            } else if (currentStory.trigger === "darkness") {
                document.documentElement.style.setProperty('--bg-color', '#000000');
            } else if (currentStory.trigger === "candle") {
                document.documentElement.style.setProperty('--glow-color', 'rgba(255, 152, 0, 0.15)');
                document.getElementById('candle-wrapper').classList.add('show');
            } else if (currentStory.trigger === "saisin") {
                document.getElementById('canvas-saisin').style.opacity = '1';
                initSaiSin();
            }

            // แสดงข้อความ
            setTimeout(() => {
                p.classList.add('active');
                isAnimating = false;
            }, 100);

            currentIndex++;
        }

        // ---------------- ระบบขยับสายสิญจน์ (Canvas) ----------------
        const canvas = document.getElementById('canvas-saisin');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class SaiSinLine {
            constructor() {
                this.y1 = Math.random() * canvas.height;
                this.y2 = Math.random() * canvas.height;
                this.cp1x = Math.random() * canvas.width;
                this.cp1y = Math.random() * canvas.height;
                this.cp2x = Math.random() * canvas.width;
                this.cp2y = Math.random() * canvas.height;
                this.offset = Math.random() * 100;
                this.speed = 0.005 + Math.random() * 0.01;
            }
            draw(time) {
                ctx.beginPath();
                ctx.moveTo(0, this.y1 + Math.sin(time * this.speed + this.offset) * 20);
                ctx.bezierCurveTo(
                    this.cp1x + Math.sin(time * this.speed * 1.5) * 50, this.cp1y,
                    this.cp2x + Math.cos(time * this.speed * 0.8) * 50, this.cp2y,
                    canvas.width, this.y2 + Math.cos(time * this.speed + this.offset) * 20
                );
                ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function initSaiSin() {
            // สร้างสายสิญจน์จำนวน 15 เส้น
            for (let i = 0; i < 15; i++) {
                lines.push(new SaiSinLine());
            }
            animateSaiSin(0);
        }

        function animateSaiSin(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lines.forEach(line => line.draw(time));
            requestAnimationFrame(animateSaiSin);
        }

    </script>
</body>
</html>
