<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ยินดีต้อนรับสู่ช่อแก้ว</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-color: rgba(255, 215, 120, 0);
            --bg-color: #050507;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-color);
            color: #eee;
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            transition: background-color 3s ease;
        }

        /* เอฟเฟกต์แสงไฟ */
        #lighting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 60%, var(--light-color) 0%, rgba(5,5,7,1) 80%);
            transition: background 4s ease;
            z-index: 1;
            pointer-events: none;
        }

        /* คอนเทนเนอร์หลัก */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        /* กล่องข้อความ */
        #text-box {
            max-width: 600px;
            width: 100%;
            min-height: 150px;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #text-box.chant {
            font-family: 'Charm', cursive;
            font-size: 1.6rem;
            color: #fcebbb;
        }

        /* ปุ่มเริ่มเกม (เพื่อปลดล็อกเสียง) */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 1s ease;
        }

        .btn {
            padding: 15px 40px;
            border: 1px solid #555;
            background: transparent;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* เทียนสมจริง (CSS Render) */
        #candle-container {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 3s ease;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flame {
            width: 18px;
            height: 35px;
            background: radial-gradient(ellipse at bottom, #ffffff 10%, #ffe100 40%, #ff6a00 80%, transparent);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 30px #ffaa00, 0 0 60px #ff6a00;
            transform-origin: bottom center;
        }

        .wick {
            width: 2px;
            height: 6px;
            background: #222;
            border-radius: 2px;
            margin-top: -2px;
        }

        .wax {
            width: 35px;
            height: 100px;
            background: linear-gradient(to right, #d3a45c, #fcedc9 30%, #d3a45c);
            border-radius: 4px 4px 8px 8px;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .wax::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); box-shadow: 0 0 25px #ffaa00, 0 0 50px #ff6a00; }
            50% { transform: scale(1.05) rotate(1deg); box-shadow: 0 0 35px #ffaa00, 0 0 70px #ff6a00; }
            100% { transform: scale(0.95) rotate(0deg); box-shadow: 0 0 30px #ffaa00, 0 0 60px #ff6a00; }
        }

        /* Canvas รวม สายสิญจน์ & ดอกไม้ */
        #fx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* คำแนะนำคลิก */
        .click-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button class="btn" id="start-btn">เข้าสู่พิธี</button>
    </div>

    <div id="lighting"></div>
    <canvas id="fx-canvas"></canvas>

    <div id="candle-container">
        <div class="flame"></div>
        <div class="wick"></div>
        <div class="wax"></div>
    </div>

    <div id="game-container">
        <div id="text-box"></div>
        <div class="click-hint">แตะหน้าจอเพื่อไปต่อ</div>
    </div>

    <script>
        const storyData = [
            { text: "หลังจากการเดินทางอันยาวนานตลอดทั้งวัน ในที่สุดรถบัสของมหาวิทยาลัยสิบศิลป์สิริศาสตร์และมหาวิทยาลัยเบงจันทร์ก็เคลื่อนตัวเข้าสู่มหาวิทยาลัยช่อแก้ว...", effect: "normal" },
            { text: "กระทั่งยามเย็นเมื่อทุกคนจัดการธุระส่วนตัวเรียบร้อยแล้ว จึงถูกเชิญมาที่ลานหน้าคณะศิลปกรรมศาสตร์", effect: "normal" },
            { text: "แสงแดดยามเย็นกำลังอ่อนตัวลง ขณะที่ลมต้นฤดูฝนพัดเอากลิ่นดินและความเย็นสบายเข้ามาปะทะใบหน้า", effect: "dim" },
            { text: "ภายในลานหน้าคณะถูกจัดเตรียมไว้ตั้งแต่ช่วงบ่าย ผ้าขาวถูกขึงประดับเหนือศีรษะ สายสิญจน์ทอดยาวล้อมพื้นที่พิธีเอาไว้", effect: "dim" },
            { text: "บายศรีต้นใหญ่ตั้งเด่นอยู่กลางลานรอรับผู้มาเยือน นักศึกษาช่อแก้วทยอยยืนเรียงแถวอยู่ทั้งสองข้างทาง", effect: "dim" },
            { text: "บางคนเคยพูดคุยกันผ่านหน้าจอ\nบางคนเคยเห็นเพียงภาพถ่าย\nและบางคนก็ยังไม่เคยรู้จักกันเลย", effect: "dim" },
            { text: "แต่ค่ำคืนนี้... คือจุดเริ่มต้นของการทำความรู้จักกัน", effect: "dim" },
            { text: "เมื่อสมาชิกจากทั้งสามมหาวิทยาลัยมารวมตัวกันครบถ้วน ตัวแทนสโมสรนักศึกษาช่อแก้วจึงก้าวออกมากล่าวต้อนรับ", effect: "dim" },
            { text: '"สวัสดีทุกคนค่ะ"', type: "chant" },
            { text: '"ในนามของมหาวิทยาลัยช่อแก้ว พวกเรายินดีต้อนรับเพื่อน ๆ จากสิบศิลป์สิริศาสตร์และเบงจันทร์ สู่จังหวัดขอนแก่น"', type: "chant" },
            { text: '"หวังว่าตลอดระยะเวลาที่จะอยู่ร่วมกันหลังจากนี้ ทุกคนจะได้รับมิตรภาพ ความสุข และความทรงจำดี ๆ กลับไปนะคะ"', type: "chant" },
            { text: "เสียงปรบมือดังขึ้นเบา ๆ ทั่วบริเวณ ก่อนที่พิธีกรจะเชิญทุกคนนั่งล้อมรอบบริเวณพิธีที่จัดเตรียมไว้", effect: "dim" },
            { text: "กลางวงล้อมมีบายศรีประดับด้วยดอกไม้สีขาวและเหลืองอย่างสวยงาม...", effect: "flower" },
            { text: "เทียนเล่มเล็กถูกจุดขึ้นทีละเล่ม... จนเกิดแสงสว่างอ่อนโยนท่ามกลางความมืดมิดยามค่ำคืน", effect: "candle" },
            { text: '"ตามประเพณีของชาวอีสาน การเดินทางมาถึงสถานที่ใหม่ มักมีพิธีบายศรีสู่ขวัญเพื่อต้อนรับและอวยพร"', type: "chant" },
            { text: '"ค่ำคืนนี้จึงเป็นการรับขวัญเพื่อน ๆ ทั้งสองมหาวิทยาลัยเข้าสู่บ้านของพวกเรา"', type: "chant" },
            { text: "ผู้เฒ่าผู้แก่ที่ได้รับเชิญจากชุมชนค่อย ๆ ก้าวเข้ามานั่งหน้าพานบายศรี ฝ่ามือเหี่ยวย่นยกขึ้นพนมเหนืออก ก่อนจะหลับตาลงช้า ๆ", effect: "candle" },
            { text: "เสียงแคนที่บรรเลงอยู่ด้านข้างค่อย ๆ เบาลง เหลือเพียงเสียงลมยามเย็นพัดผ่านยอดไม้", effect: "candle" },
            { text: '"ศรีเอ๋ย ศรีมา..."', type: "chant" },
            { text: '"ศรีของลูกหลานจากแดนไกล ศรีของผู้เดินทางข้ามภูเขา ข้ามแม่น้ำ ให้คืนมาอยู่เนื้ออยู่โต อยู่กายอยู่ใจ"', type: "chant" },
            { text: '"มื้อนี้เป็นมื้อดี มื้อแห่งการพบพ้อ มื้อแห่งการผูกสัมพันธ์ ขอให้ทุกคนอยู่ดีมีแฮง เดินทางปลอดภัย พ้อแต่หมู่มิตรที่จริงใจ"', type: "chant" },
            { text: "เสียงสวดดำเนินไปอย่างช้า ๆ แสงเทียนส่องไหวไปตามแรงลม...", effect: "candle" },
            { text: "รอบตัวเงียบสงบเสียจนได้ยินเพียงเสียงแคน เสียงบทเอิ้นขวัญ และเสียงหัวใจของผู้ร่วมพิธี", effect: "candle" },
            { text: '"มาเด้อขวัญเอ๋ย มาเด้อ..."', type: "chant" },
            { text: '"ขวัญที่อยู่ภูไกลให้คืนมา ขวัญที่อยู่ฟ้าไกลให้คืนมา ขวัญที่อยู่ทางใดให้คืนมา"', type: "chant" },
            { text: '"ให้มาอยู่กับเจ้าของ ให้อยู่คู่กายคู่ใจ ให้มีแต่ความสุข ความเจริญ"', type: "chant" },
            { text: "เมื่อสิ้นคำเอิ้นขวัญ... ผู้เฒ่าจึงหยิบสายสิญจน์ขึ้นมา", effect: "saisin" },
            { text: '"นับแต่มื้อนี้ไป ขอให้ลูกหลานทั้งสามสถาบันฮักแพงกันคือพี่น้อง"', type: "chant" },
            { text: '"ยินดีต้อนรับสู่ช่อแก้วเด้อ"', type: "chant" },
            { text: "นักศึกษาจากทั้งสามมหาวิทยาลัยนั่งเคียงข้างกันอย่างเป็นระเบียบ ราวกับกำแพงของคำว่า คนละสถาบัน กำลังค่อย ๆ จางหายไป", effect: "warm" },
            { text: "เมื่อพิธีดำเนินมาถึงช่วงสุดท้าย เหล่ารุ่นพี่และตัวแทนจึงหยิบสายสิญจน์ขึ้นมาผูกข้อมือให้แก่ผู้มาเยือนทีละคน", effect: "warm" },
            { text: "เสียงหัวเราะดังขึ้นเป็นระยะ บทสนทนาแรกเริ่มเกิดขึ้น ความเกร็งจากการพบกันครั้งแรกถูกแทนที่ด้วยรอยยิ้ม", effect: "warm" },
            { text: '"จากนี้ไป พวกเราอาจไม่ได้เป็นเพียงนักศึกษาจากสามมหาวิทยาลัย"', type: "chant" },
            { text: '"แต่จะเป็นเพื่อนร่วมค่ายเดียวกัน"', type: "chant" },
            { text: '"ขอต้อนรับทุกคนเข้าสู่มหาวิทยาลัยช่อแก้วอย่างเป็นทางการค่ะ"', type: "chant" },
            { text: "เสียงปรบมือดังก้องไปทั่วลานกิจกรรม ภายใต้ท้องฟ้ายามค่ำของเมืองขอนแก่น...", effect: "warm" },
            { text: "ค่ำคืนแรกของการพบกันจึงเริ่มต้นขึ้นอย่างอบอุ่น\nและเต็มไปด้วยความหมาย...", effect: "warm" },
            { text: "[ จบตอน ]", effect: "end" }
        ];

        let currentIndex = 0;
        let isTyping = false;
        const textBox = document.getElementById('text-box');
        const container = document.getElementById('game-container');
        const lighting = document.getElementById('lighting');
        const candle = document.getElementById('candle-container');
        const fxCanvas = document.getElementById('fx-canvas');
        const bgm = document.getElementById('bgm');

        // ฟังก์ชันเริ่มเกม
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                bgm.volume = 0.5;
                bgm.play().catch(e => console.log("Audio play blocked by browser"));
                showText();
            }, 1000);
        });

        // ควบคุมการเปลี่ยนตอน
        container.addEventListener('click', () => {
            if (isTyping) {
                isTyping = false; // ข้ามการพิมพ์
            } else {
                if (currentIndex < storyData.length - 1) {
                    currentIndex++;
                    textBox.style.opacity = '0';
                    setTimeout(showText, 500);
                }
            }
        });

        function showText() {
            const current = storyData[currentIndex];
            textBox.className = current.type === 'chant' ? 'chant' : '';
            textBox.innerHTML = '';
            textBox.style.opacity = '1';
            
            // ประมวลผล Effect สภาพแวดล้อม
            applyEffects(current.effect);

            // พิมพ์ข้อความ
            let charIndex = 0;
            isTyping = true;
            const textToType = current.text.replace(/\n/g, '<br>');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = textToType;
            const textArray = Array.from(tempDiv.childNodes).reduce((acc, node) => {
                if (node.nodeType === 3) return acc.concat(node.nodeValue.split(''));
                if (node.nodeName === 'BR') acc.push('<br>');
                return acc;
            }, []);

            function typeChar() {
                if (!isTyping) {
                    textBox.innerHTML = textToType;
                    return;
                }
                if (charIndex < textArray.length) {
                    if (textArray[charIndex] === '<br>') {
                        textBox.innerHTML += '<br>';
                    } else {
                        textBox.innerHTML += textArray[charIndex];
                    }
                    charIndex++;
                    setTimeout(typeChar, 30);
                } else {
                    isTyping = false;
                }
            }
            typeChar();
        }

        function applyEffects(effect) {
            switch(effect) {
                case 'dim':
                    lighting.style.background = 'radial-gradient(circle at 50% 60%, rgba(255, 215, 120, 0.05) 0%, rgba(2,2,3,1) 100%)';
                    break;
                case 'flower':
                    lighting.style.background = 'radial-gradient(circle at 50% 60%, rgba(255, 215, 120, 0.05) 0%, rgba(2,2,3,1) 100%)';
                    fxCanvas.style.opacity = '1';
                    isRainingFlowers = true;
                    initFlowers();
                    if (!animationId) animateCanvas();
                    break;
                case 'candle':
                    lighting.style.background = 'radial-gradient(circle at 50% 80%, rgba(255, 200, 80, 0.25) 0%, rgba(5,5,10,0.9) 70%, rgba(0,0,0,1) 100%)';
                    candle.style.opacity = '1';
                    break;
                case 'saisin':
                    fxCanvas.style.opacity = '1';
                    ropesActive = true;
                    initSaisin();
                    if (!animationId) animateCanvas();
                    break;
                case 'warm':
                    lighting.style.background = 'radial-gradient(circle at 50% 80%, rgba(255, 220, 150, 0.3) 0%, rgba(15,15,20,0.85) 80%, rgba(5,5,5,1) 100%)';
                    break;
            }
        }

        // ==========================================
        // ระบบฟิสิกส์ Canvas (สายสิญจน์ & ดอกไม้)
        // ==========================================
        const ctx = fxCanvas.getContext('2d');
        let width, height;
        let ropes = [];
        let flowers = [];
        let mouse = { x: -1000, y: -1000, active: false };
        let animationId;
        let isRainingFlowers = false;
        let ropesActive = false;

        window.addEventListener('resize', resizeCanvas);
        container.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        container.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        container.addEventListener('mouseleave', () => { mouse.x = -1000; });
        container.addEventListener('touchend', () => { mouse.x = -1000; });

        function resizeCanvas() {
            width = fxCanvas.width = window.innerWidth;
            height = fxCanvas.height = window.innerHeight;
        }
        resizeCanvas();

        // --- ระบบดอกไม้ร่วง ---
        class Flower {
            constructor() {
                this.reset(true);
            }
            reset(randomY = false) {
                this.x = Math.random() * width;
                this.y = randomY ? Math.random() * height - height : -50;
                this.size = Math.random() * 4 + 3; // ขนาด 3-7
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                // สุ่มสีขาว หรือ สีเหลืองนวล
                this.color = Math.random() > 0.5 ? 'rgba(255, 255, 255, 0.7)' : 'rgba(255, 225, 120, 0.7)';
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5; // พลิ้วไหวซ้ายขวาตามลม
                this.rotation += this.rotationSpeed;
                if (this.y > height + 50) this.reset();
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                
                // วาดกลีบดอกไม้ 5 กลีบแบบสมจริง
                for(let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.ellipse(0, this.size * 0.8, this.size * 0.35, this.size * 0.8, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.rotate((Math.PI * 2) / 5);
                }
                
                // เกสรตรงกลาง
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.3, 0, 2 * Math.PI);
                ctx.fillStyle = this.color === 'rgba(255, 255, 255, 0.7)' ? 'rgba(255, 200, 50, 0.8)' : 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
                ctx.restore();
            }
        }

        function initFlowers() {
            if (flowers.length > 0) return;
            for(let i = 0; i < 25; i++) { // จำนวนดอกไม้ที่ลอยในจอ
                flowers.push(new Flower());
            }
        }

        // --- ระบบสายสิญจน์ ---
        class Point {
            constructor(x, y, isPinned) {
                this.x = x; this.y = y;
                this.oldx = x; this.oldy = y;
                this.pinned = isPinned;
            }
        }

        class Rope {
            constructor(startX, startY, endX, endY, segments) {
                this.points = [];
                const distX = (endX - startX) / segments;
                const distY = (endY - startY) / segments;
                this.length = Math.sqrt(distX*distX + distY*distY);

                for (let i = 0; i <= segments; i++) {
                    let isPinned = (i === 0 || i === segments);
                    this.points.push(new Point(startX + distX * i, startY + distY * i + (Math.random()*10), isPinned));
                }
            }

            update() {
                for (let p of this.points) {
                    if (!p.pinned) {
                        let vx = (p.x - p.oldx) * 0.98;
                        let vy = (p.y - p.oldy) * 0.98;
                        p.oldx = p.x;
                        p.oldy = p.y;
                        p.x += vx;
                        p.y += vy + 0.1; // แรงโน้มถ่วง

                        // หนีเมาส์/นิ้ว
                        let dx = p.x - mouse.x;
                        let dy = p.y - mouse.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 80) {
                            p.x += (dx / dist) * 2;
                            p.y += (dy / dist) * 2;
                        }
                    }
                }

                // ข้อต่อความตึง
                for (let iter = 0; iter < 3; iter++) {
                    for (let i = 0; i < this.points.length - 1; i++) {
                        let p1 = this.points[i];
                        let p2 = this.points[i+1];
                        let dx = p2.x - p1.x;
                        let dy = p2.y - p1.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let diff = this.length - dist;
                        let percent = diff / dist / 2;
                        let offsetX = dx * percent;
                        let offsetY = dy * percent;

                        if (!p1.pinned) { p1.x -= offsetX; p1.y -= offsetY; }
                        if (!p2.pinned) { p2.x += offsetX; p2.y += offsetY; }
                    }
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    let xc = (this.points[i].x + this.points[i-1].x) / 2;
                    let yc = (this.points[i].y + this.points[i-1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i-1].x, this.points[i-1].y, xc, yc);
                }
                ctx.lineTo(this.points[this.points.length-1].x, this.points[this.points.length-1].y);
                // ปรับสีสายสิญจน์ให้อ่อนลง (โปร่งแสงมากขึ้น)
                ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function initSaisin() {
            if (ropes.length > 0) return;
            // ลดจำนวนเส้นลงเหลือฝั่งละ 2 เส้น เพื่อไม่ให้รกจอ
            for(let i=0; i<2; i++) {
                ropes.push(new Rope(0, Math.random()*height*0.8, width, Math.random()*height*0.8, 40));
                ropes.push(new Rope(Math.random()*width, 0, Math.random()*width, height, 40));
            }
        }

        // --- Loop อนิเมชันหลัก ---
        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            
            // วาดดอกไม้ก่อน (ให้อยู่หลังสายสิญจน์)
            if (isRainingFlowers) {
                for (let f of flowers) {
                    f.update();
                    f.draw(ctx);
                }
            }

            // วาดสายสิญจน์ทับ
            if (ropesActive) {
                for (let rope of ropes) {
                    rope.update();
                    rope.draw(ctx);
                }
            }
            
            animationId = requestAnimationFrame(animateCanvas);
        }
    </script>
</body>
