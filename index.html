<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฐมนิเทศสามสถาบัน - พิธีบายศรีสู่ขวัญ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pridi:wght@300;400;500&family=Sarabun:wght@300;400&display=swap');

        :root {
            --bg-color: #1a1a1d;
            --text-color: #e0e0e0;
            --highlight: #f4d03f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* ป้องกันการคลุมดำข้อความ */
        }

        body, html {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* พื้นหลังบรรยากาศ */
        #atmosphere {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            transition: all 4s ease-in-out;
            z-index: 1;
        }

        #atmosphere.dark-mode {
            background: #050505;
        }

        #atmosphere.candle-mode {
            background: radial-gradient(circle at center, #3a250b 0%, #050505 80%);
        }

        /* สายสิญจน์ Canvas */
        #thread-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease;
        }

        /* กล่องข้อความ */
        #story-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .story-text {
            font-family: 'Pridi', serif;
            font-size: 1.2rem;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .story-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* เทียน CSS อิงความสมจริง (ไม่ใช่ Emoji) */
        #candle-container {
            position: absolute;
            bottom: 15%;
            z-index: 5;
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 2s;
        }

        .flame {
            width: 20px;
            height: 40px;
            background: radial-gradient(ellipse at bottom, #fff 10%, #f4d03f 40%, #e67e22 80%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 -10px 30px #f4d03f, 0 0 20px #e67e22;
            transform-origin: bottom center;
            animation: flicker 0.1s infinite alternate;
            opacity: 0;
            transition: opacity 1s;
        }

        .wick {
            width: 3px;
            height: 10px;
            background: #2c3e50;
            border-radius: 2px;
            margin-top: -5px;
        }

        .wax {
            width: 40px;
            height: 120px;
            background: linear-gradient(to right, #fdfbfb, #ebedee);
            border-radius: 5px 5px 2px 2px;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .wax::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 50%;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        }

        /* คำแนะนำการกด */
        .instruction {
            position: absolute;
            bottom: 5%;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div id="atmosphere"></div>
    <canvas id="thread-canvas"></canvas>
    
    <audio id="bg-music" src="your-music-file.mp3" loop></audio>

    <div id="candle-container">
        <div class="flame" id="flame"></div>
        <div class="wick"></div>
        <div class="wax"></div>
    </div>

    <div id="story-container">
        <div id="text-display" class="story-text">แตะหน้าจอเพื่อเริ่มต้นการเดินทาง...</div>
    </div>

    <div id="instruction-text" class="instruction">แตะเพื่อไปต่อ</div>

    <script>
        const story = [
            { text: "หลังจากการเดินทางอันยาวนานตลอดทั้งวัน ในที่สุดรถบัสของมหาวิทยาลัยสิบศิลป์สิริศาสตร์และมหาวิทยาลัยเบงจันทร์ก็เคลื่อนตัวเข้าสู่มหาวิทยาลัยช่อแก้ว", event: "normal" },
            { text: "กระทั่งยามเย็นเมื่อทุกคนจัดการธุระส่วนตัวของตนเองเรียบร้อยแล้วจึงถูกเชิญมาที่ลานหน้าคณะศิลปกรรมศาสตร์", event: "normal" },
            { text: "แสงแดดยามเย็นกำลังอ่อนตัวลง...", event: "dim" }, // แสงดับลงตรงนี้
            { text: "ขณะที่ลมต้นฤดูฝนพัดเอากลิ่นดินและความเย็นสบายเข้ามาปะทะใบหน้า", event: "normal" },
            { text: "ภายในลานหน้าคณะศิลปกรรมศาสตร์ของมหาวิทยาลัยถูกจัดเตรียมไว้ตั้งแต่ช่วงบ่าย", event: "normal" },
            { text: "ผ้าขาวถูกขึงประดับเหนือศีรษะ สายสิญจน์ทอดยาวล้อมพื้นที่พิธีเอาไว้ ขณะที่บายศรีต้นใหญ่ตั้งเด่นอยู่กลางลานรอรับผู้มาเยือน", event: "normal" },
            { text: "นักศึกษาช่อแก้วทยอยยืนเรียงแถวอยู่ทั้งสองข้างทาง เสียงพูดคุยและรอยยิ้มดังขึ้นเป็นระยะเมื่อได้พบหน้ากันเป็นครั้งแรก", event: "normal" },
            { text: "บางคนเคยพูดคุยกันผ่านหน้าจอ... บางคนเคยเห็นเพียงภาพถ่าย...", event: "normal" },
            { text: "และบางคนก็ยังไม่เคยรู้จักกันเลย", event: "normal" },
            { text: "แต่ค่ำคืนนี้คือจุดเริ่มต้นของการทำความรู้จักกัน", event: "normal" },
            { text: "\"สวัสดีทุกคนค่ะ ในนามของมหาวิทยาลัยช่อแก้ว พวกเรายินดีต้อนรับเพื่อน ๆ จากมหาวิทยาลัยสิบศิลป์สิริศาสตร์และมหาวิทยาลัยเบงจันทร์สู่จังหวัดขอนแก่น\"", event: "normal" },
            { text: "เสียงปรบมือดังขึ้นเบา ๆ ทั่วบริเวณ ก่อนที่พิธีกรจะเชิญทุกคนนั่งล้อมรอบบริเวณพิธีที่จัดเตรียมไว้", event: "normal" },
            { text: "กลางวงล้อมมีบายศรีประดับด้วยดอกไม้สีขาวและเหลืองอย่างสวยงาม...", event: "show_candle" }, // โชว์เทียนแต่ยังไม่จุด
            { text: "เทียนเล่มเล็กถูกจุดขึ้นทีละเล่ม จนเกิดแสงสว่างอ่อนโยนท่ามกลางยามค่ำ", event: "light_candle" }, // มินิเกมจุดเทียน แสงสว่างขึ้น
            { text: "\"ตามประเพณีของชาวอีสาน การเดินทางมาถึงสถานที่ใหม่หรือการเริ่มต้นสิ่งใหม่ มักมีพิธีบายศรีสู่ขวัญเพื่อเป็นการต้อนรับและอวยพร\"", event: "normal" },
            { text: "เมื่อทุกคนนั่งประจำที่เรียบร้อยแล้ว ผู้เฒ่าผู้แก่ที่ได้รับเชิญจากชุมชนค่อย ๆ ก้าวเข้ามานั่งหน้าพานบายศรี ฝ่ามือเหี่ยวย่นยกขึ้นพนมเหนืออก ก่อนจะหลับตาลงช้า ๆ", event: "normal" },
            { text: "เสียงแคนที่บรรเลงอยู่ด้านข้างค่อย ๆ เบาลง เหลือเพียงเสียงลมยามเย็นพัดผ่านยอดไม้", event: "normal" },
            { text: "\"ศรีเอ๋ย ศรีมา... ศรีของลูกหลานจากแดนไกล\"", event: "normal" },
            { text: "\"มื้อนี้เป็นมื้อดี มื้อแห่งการพบพ้อ มื้อแห่งการผูกสัมพันธ์ ขอให้ทุกคนอยู่ดีมีแฮง...\"", event: "normal" },
            { text: "เสียงสวดดำเนินไปอย่างช้า ๆ แสงเทียนส่องไหวไปตามแรงลม", event: "normal" },
            { text: "รอบตัวเงียบสงบเสียจนได้ยินเพียงเสียงแคน เสียงบทเอิ้นขวัญ และเสียงหัวใจของผู้ร่วมพิธี", event: "normal" },
            { text: "เมื่อสิ้นคำเอิ้นขวัญ ผู้เฒ่าจึงหยิบสายสิญจน์ขึ้นมา...", event: "show_thread" }, // สายสิญจน์เริ่มร้อยเรียงบนจอ
            { text: "\"นับแต่มื้อนี้ไป ขอให้ลูกหลานทั้งสามสถาบันฮักแพงกันคือพี่น้อง ยินดีต้อนรับสู่ช่อแก้วเด้อ\"", event: "normal" },
            { text: "นักศึกษาจากทั้งสามมหาวิทยาลัยนั่งเคียงข้างกันอย่างเป็นระเบียบ ราวกับกำแพงของคำว่า 'คนละสถาบัน' กำลังค่อย ๆ จางหายไป", event: "normal" },
            { text: "เหล่ารุ่นพี่และตัวแทนจากมหาวิทยาลัยช่อแก้วจึงหยิบสายสิญจน์ขึ้นมาผูกข้อมือให้แก่ผู้มาเยือนทีละคน", event: "normal" },
            { text: "เสียงหัวเราะดังขึ้นเป็นระยะ บทสนทนาแรกเริ่มเกิดขึ้น และความเกร็งจากการพบกันครั้งแรกก็ค่อย ๆ ถูกแทนที่ด้วยรอยยิ้ม", event: "normal" },
            { text: "\"จากนี้ไป พวกเราอาจไม่ได้เป็นเพียงนักศึกษาจากสามมหาวิทยาลัย... แต่จะเป็นเพื่อนร่วมค่ายเดียวกัน\"", event: "normal" },
            { text: "เสียงปรบมือดังก้องไปทั่วลานกิจกรรม ภายใต้ท้องฟ้ายามค่ำของเมืองขอนแก่น ค่ำคืนแรกของการพบกันจึงเริ่มต้นขึ้นอย่างอบอุ่น", event: "normal" },
            { text: "และเต็มไปด้วยความหมาย...", event: "end" }
        ];

        let currentIndex = -1;
        const textDisplay = document.getElementById('text-display');
        const atmosphere = document.getElementById('atmosphere');
        const bgMusic = document.getElementById('bg-music');
        const instruction = document.getElementById('instruction-text');
        const storyContainer = document.getElementById('story-container');
        const candleContainer = document.getElementById('candle-container');
        const flame = document.getElementById('flame');
        const canvas = document.getElementById('thread-canvas');
        const ctx = canvas.getContext('2d');

        let isMusicPlaying = false;
        let requiresHold = false;
        let holdTimer;
        let threadsActive = false;

        // ปรับขนาด Canvas ให้เต็มจอ
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function nextLine() {
            if (requiresHold) return; // ล็อกไว้ถ้าต้องเล่นมินิเกมจุดเทียน

            currentIndex++;
            if (currentIndex >= story.length) return;

            // เล่นเพลงเมื่อกดครั้งแรก
            if (!isMusicPlaying) {
                bgMusic.volume = 0.5;
                bgMusic.play().catch(e => console.log("Audio play prevented"));
                isMusicPlaying = true;
            }

            const currentStory = story[currentIndex];
            
            // แอนิเมชันเปลี่ยนข้อความ (Fade out -> Fade in)
            textDisplay.classList.remove('active');
            setTimeout(() => {
                textDisplay.innerHTML = currentStory.text;
                textDisplay.classList.add('active');
                handleEvent(currentStory.event);
            }, 500);
        }

        function handleEvent(event) {
            switch(event) {
                case 'dim':
                    atmosphere.classList.add('dark-mode');
                    break;
                case 'show_candle':
                    candleContainer.style.display = 'flex';
                    setTimeout(() => { candleContainer.style.opacity = '1'; }, 100);
                    storyContainer.style.transform = "translateY(-15vh)"; // เลื่อนข้อความขึ้นหลบเทียน
                    break;
                case 'light_candle':
                    requiresHold = true;
                    instruction.innerHTML = "แตะค้างไว้ที่หน้าจอเพื่อจุดเทียน";
                    break;
                case 'show_thread':
                    canvas.style.opacity = '0.6';
                    threadsActive = true;
                    animateThreads();
                    break;
                case 'end':
                    instruction.innerHTML = "จบบทนำ";
                    break;
            }
        }

        // ระบบจุดเทียน (Hold to interact)
        const startHold = (e) => {
            if (!requiresHold) return;
            holdTimer = setTimeout(() => {
                flame.style.opacity = '1';
                atmosphere.classList.add('candle-mode');
                instruction.innerHTML = "แตะเพื่อไปต่อ";
                requiresHold = false;
                // สั่นมือถือเบาๆ ถ้าอุปกรณ์รองรับ ให้รู้สึกถึงการจุดติด
                if (navigator.vibrate) navigator.vibrate(100); 
            }, 1500); // ต้องกดค้าง 1.5 วินาที
        };

        const endHold = () => {
            clearTimeout(holdTimer);
        };

        // Event Listeners สำหรับมือถือและ PC
        storyContainer.addEventListener('mousedown', (e) => { if(!requiresHold) nextLine(); else startHold(e); });
        storyContainer.addEventListener('mouseup', endHold);
        storyContainer.addEventListener('mouseleave', endHold);
        
        storyContainer.addEventListener('touchstart', (e) => { if(!requiresHold) nextLine(); else startHold(e); });
        storyContainer.addEventListener('touchend', endHold);

        // ระบบวาดสายสิญจน์ (Particle + Bezier Curves)
        let time = 0;
        function animateThreads() {
            if (!threadsActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            for(let i = 0; i < 5; i++) {
                // วาดเส้นโค้งพริ้วไหวหลายๆ เส้นพันกัน
                let y1 = canvas.height * 0.3 + Math.sin(time + i) * 50;
                let y2 = canvas.height * 0.7 + Math.cos(time + i*2) * 50;
                let cp1x = canvas.width * 0.3 + Math.cos(time*0.5) * 100;
                let cp2x = canvas.width * 0.7 + Math.sin(time*0.5) * 100;
                
                ctx.moveTo(0, y1);
                ctx.bezierCurveTo(cp1x, y1 - 100, cp2x, y2 + 100, canvas.width, y2);
            }
            ctx.stroke();
            
            time += 0.02;
            requestAnimationFrame(animateThreads);
        }

    </script>
</body>
</html>
